                </span>
</div>
<!-- Heading -->
<h1 class="font-headline-md text-headline-md text-primary mb-sm">

<p class="font-body-md text-body-md text-on-surface-variant mb-xl">

<div class="w-full flex flex-col gap-md">
<button class="w-full py-3 px-8 rounded-full border-[0.5px] border-primary text-primary font-label-sm text-label-sm hover:bg-surface-container-low transition-colors duration-300">
