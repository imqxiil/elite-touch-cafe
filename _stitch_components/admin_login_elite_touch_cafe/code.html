<!-- Subtle blurred background layer for depth -->
<div class="absolute inset-0 z-0 bg-cover bg-center opacity-40 mix-blend-multiply filter blur-2xl" data-alt="A highly abstract, extremely out-of-focus background image representing a luxurious, minimalist restaurant interior or gallery space during daytime. The scene is dominated by soft, diffused natural light creating a bright, airy light-mode aesthetic. The color palette relies entirely on pristine off-whites, pale warm grays, and very subtle hints of deep cool shadows. The mood is serene, upscale, and impeccably clean, providing a quiet, unobtrusive texture for a premium digital interface without distracting from the foreground." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC-0lC1CKx4siLw-WKShRLQR_nXZtkFGq5hY5kwT2blHLmprJbH__AmZs6Wgel1qZbVl--EcgshcWjb0jN8P0zZrz4QYG3YPdqRFOlrRMlEWsEa3_D4-f0hpiwNek226AnqVrohEFigPr6gObIQ7iNBJ4cb5fyY-yNMVZoI_jTsWAksQ6RNeKGdVtlfa-Chxlr4BokvKGTzLqmfN4OfnVehCZSx7GROTMwhUbLH84qZXQyA7pi7f4UEZXJm3SP-h34nQaqdKkGW4gMG');">
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-md px-margin-mobile md:px-0">
<!-- Login Card -->
<div class="bg-surface-container-lowest border-[0.5px] border-outline-variant rounded-lg p-xl md:p-xxl flex flex-col gap-xl shadow-[0_8px_30px_rgb(0,6,102,0.04)] backdrop-blur-sm">
<!-- Brand Header -->
<div class="flex flex-col items-center gap-sm text-center">
<span class="font-headline-md text-headline-md text-primary tracking-tight">Et</span>
<h1 class="font-headline-sm text-headline-sm text-on-surface mt-sm">Elite Touch Cafe</h1>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest mt-xs">Admin Portal</p>
</div>
<!-- Form Container -->
<form class="flex flex-col gap-lg mt-md">
<!-- Email Field -->
<div class="flex flex-col gap-xs group">
<label class="font-label-sm text-label-sm text-on-surface-variant group-focus-within:text-primary transition-colors duration-200" for="email">Email Address</label>
<input class="w-full bg-transparent border-b-[1px] border-outline-variant focus:border-primary text-on-surface font-body-md text-body-md py-sm px-0 outline-none transition-colors duration-200 placeholder:text-outline-variant/50" id="email" placeholder="admin@elitetouch.cafe" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs group">
<div class="flex justify-between items-end">
<label class="font-label-sm text-label-sm text-on-surface-variant group-focus-within:text-primary transition-colors duration-200" for="password">Password</label>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors duration-200" href="#">Forgot?</a>
</div>
<input class="w-full bg-transparent border-b-[1px] border-outline-variant focus:border-primary text-on-surface font-body-md text-body-md py-sm px-0 outline-none transition-colors duration-200" id="password" required="" type="password"/>
</div>
<!-- Submit Action -->
<button class="mt-lg w-full bg-primary text-on-primary rounded-lg py-[12px] px-[32px] font-label-sm text-label-sm hover:opacity-90 hover:shadow-[0_4px_20px_rgb(0,6,102,0.15)] transition-all duration-300 flex items-center justify-center gap-sm" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
</main>
